<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Splitter API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-4">Enterprise Bill Splitter</h1>

        <div class="mb-8 border-b pb-4">
            <h2 class="text-xl font-semibold mb-2">1. Create a Tab (Backend-Computed Splits)</h2>

            <div class="grid grid-cols-1 gap-3">
                <label class="text-sm">
                    <div class="text-gray-700 mb-1">Leader</div>
                    <input id="leaderInput" class="w-full border rounded px-3 py-2" value="Amaan Siddiqui" />
                </label>

                <label class="text-sm">
                    <div class="text-gray-700 mb-1">Total Amount (₹)</div>
                    <input id="totalAmountInput" type="number" class="w-full border rounded px-3 py-2" value="2400" min="1" step="1" />
                    <div class="text-xs text-gray-500 mt-1">Stored as paise in backend.</div>
                </label>

                <label class="text-sm">
                    <div class="text-gray-700 mb-1">Participants (one per line)</div>
                    <textarea id="participantsInput" class="w-full border rounded px-3 py-2" rows="3">Amaan Siddiqui
Friend 1</textarea>
                </label>

                <div class="flex gap-2">
                    <button id="quoteBtn" class="bg-gray-700 text-white px-4 py-2 rounded hover:bg-gray-800">
                        Quote Equal Split
                    </button>
                    <button id="createTabBtn" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        Create Tab
                    </button>
                </div>

                <p id="tabStatus" class="text-sm text-gray-500"></p>
            </div>
        </div>

        <div class="mb-8 border-b pb-4">
            <h2 class="text-xl font-semibold mb-2">2. Group Splits</h2>
            <div id="splitsContainer" class="space-y-4">
                <p class="text-gray-500 italic">Create a tab to see splits here...</p>
            </div>
        </div>

        <div>
            <h2 class="text-xl font-semibold mb-2">Live WebSocket Logs</h2>
            <div id="logs" class="bg-gray-900 text-green-400 p-4 rounded h-40 overflow-y-auto font-mono text-sm">
                Waiting for events...
            </div>
        </div>
    </div>

    <script>
        const socket = io(); // Connects automatically to the host serving the page
        let currentTabId = null;
        let lastQuote = null;
        let razorpayKeyId = null;

        const getRazorpayKeyId = async () => {
            if (razorpayKeyId) return razorpayKeyId;
            const res = await fetch('/api/config/public');
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'failed to load public config');
            if (!data.razorpayKeyId) throw new Error('razorpayKeyId missing from server config');
            razorpayKeyId = data.razorpayKeyId;
            return razorpayKeyId;
        };

        // --- UI Log Helper ---
        const log = (message) => {
            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${message}</div>`;
            logsDiv.scrollTop = logsDiv.scrollHeight;
        };

        // --- Socket Listeners ---
        socket.on('connect', () => log('Connected to WebSocket server'));
        socket.on('splitUpdated', (data) => {
            log(`⚡ WEBHOOK UPDATE: ${data.payeeName}'s split marked as ${data.status}`);
            
            // Update UI
            const statusBadge = document.getElementById(`status-${data.splitId}`);
            const payBtn = document.getElementById(`btn-${data.splitId}`);
            if (statusBadge) {
                statusBadge.textContent = data.status;
                statusBadge.className = 'bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded';
            }
            if (payBtn) {
                payBtn.disabled = true;
                payBtn.textContent = 'Paid';
                payBtn.className = 'bg-gray-400 text-white px-4 py-2 rounded cursor-not-allowed';
            }
        });

        // --- API Calls ---
        const readInputs = () => {
            const leaderId = document.getElementById('leaderInput').value.trim();
            const totalRupees = Number(document.getElementById('totalAmountInput').value);
            const totalAmount = Math.round(totalRupees * 100); // paise
            const participantsText = document.getElementById('participantsInput').value;
            const participants = participantsText
                .split('\n')
                .map((x) => x.trim())
                .filter(Boolean);

            if (!leaderId) throw new Error('Leader is required');
            if (!Number.isFinite(totalRupees) || totalRupees <= 0) throw new Error('Total amount must be positive');
            if (!Number.isInteger(totalRupees)) throw new Error('Total amount must be a whole number (₹) for this demo');
            if (participants.length < 1) throw new Error('Add at least one participant');

            return { leaderId, totalAmount, participants };
        };

        const renderQuote = (quote) => {
            const container = document.getElementById('splitsContainer');
            container.innerHTML = '';

            quote.splits.forEach((split) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-gray-50 p-3 rounded border';
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${split.payeeName}</span>
                        <span class="ml-2 text-gray-600">₹${(split.amount / 100).toFixed(2)}</span>
                        <span class="ml-2 bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded">
                            QUOTED
                        </span>
                    </div>
                    <div class="text-xs text-gray-500">Equal split</div>
                `;
                container.appendChild(div);
            });
        };

        const quoteSplits = async () => {
            const { totalAmount, participants } = readInputs();
            log(`Quoting equal split for ${participants.length} participants...`);

            const res = await fetch('/api/tabs/quote', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ totalAmount, participants })
            });
            const responseData = await res.json();
            if (!res.ok) throw new Error(responseData.error || 'quote failed');

            lastQuote = responseData.data;
            renderQuote(lastQuote);
            document.getElementById('tabStatus').textContent = `Quote ready: ${participants.length} splits computed.`;
            log('Quote computed successfully');
        };

        document.getElementById('quoteBtn').addEventListener('click', async () => {
            try {
                await quoteSplits();
            } catch (err) {
                log(`Error quoting splits: ${err.message}`);
                alert(err.message);
            }
        });

        document.getElementById('createTabBtn').addEventListener('click', async () => {
            try {
                const { leaderId, totalAmount, participants } = readInputs();

                if (!lastQuote || lastQuote.totalAmount !== totalAmount || lastQuote.participantCount !== participants.length) {
                    await quoteSplits();
                }

                const payload = {
                    leaderId,
                    totalAmount,
                    splits: lastQuote.splits
                };

                const res = await fetch('/api/tabs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const responseData = await res.json();
                if (!res.ok) throw new Error(responseData.error || 'create tab failed');

                const tab = responseData.data;
                currentTabId = tab.id;

                document.getElementById('tabStatus').textContent = `Tab created! ID: ${tab.id}`;
                log(`Tab created: ${tab.id}`);

                // Join the WebSocket room for this tab
                socket.emit('joinTab', currentTabId);
                renderSplits(tab.splits);
            } catch (err) {
                log(`Error creating tab: ${err.message}`);
                alert(err.message);
            }
        });

        const renderSplits = (splits) => {
            const container = document.getElementById('splitsContainer');
            container.innerHTML = ''; // clear

            splits.forEach(split => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-gray-50 p-3 rounded border';
                div.innerHTML = `
                    <div>
                        <span class="font-medium">${split.payeeName}</span>
                        <span class="ml-2 text-gray-600">₹${split.amount / 100}</span>
                        <span id="status-${split.id}" class="ml-2 bg-yellow-100 text-yellow-800 text-xs font-medium px-2.5 py-0.5 rounded">
                            ${split.status}
                        </span>
                    </div>
                    <button id="btn-${split.id}" onclick="initPayment('${split.id}')" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                        Pay
                    </button>
                `;
                container.appendChild(div);
            });
        };

        const initPayment = async (splitId) => {
            try {
                log(`Generating order for split: ${splitId}`);
                
                // 1. Get Order ID from backend
                const res = await fetch(`/api/splits/${splitId}/pay`, { method: 'POST' });
                const orderData = await res.json();
                
                if (!res.ok) throw new Error(orderData.error);

                const keyId = await getRazorpayKeyId();

                // 2. Open Razorpay Checkout Modal
                const options = {
                    key: keyId,
                    amount: orderData.data.amount,
                    currency: orderData.data.currency,
                    name: "Bill Splitter Inc.",
                    description: "Settle your split",
                    order_id: orderData.data.orderId,
                    handler: function (response) {
                        log(`Frontend received success from Razorpay. Waiting for backend webhook to verify...`);
                        // We do NOT update the UI to "Paid" here. 
                        // We wait for the secure WebSocket event.
                    },
                    theme: { color: "#3399cc" }
                };

                const rzp = new window.Razorpay(options);
                rzp.open();

            } catch (err) {
                log(`Error starting payment: ${err.message}`);
                alert(err.message);
            }
        };
    </script>
</body>
</html>
